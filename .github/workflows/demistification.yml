        run: echo "${{secrets.STEP2}}"
      - name: Etape 4 - Tests
        run: echo "Etape 4 - Tests"
      - name: Etape 5 - Packaging
        run: echo "Etape 5 - Packaging"
      - name: Etape 6 - Fin du pipeline
        run: echo "Etape 6 - Fin du pipeline"

